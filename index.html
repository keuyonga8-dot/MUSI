<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beat Dodge</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;user-select:none;}
body{background:#000;display:flex;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
#gw{width:100%;max-width:640px;}
#canvas-wrap{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;}
#yt-bg-player{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;}
#yt-bg-player iframe{width:100%;height:100%;border:none;}
#canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;}
#hud{display:flex;justify-content:space-between;align-items:center;padding:10px 18px;background:#111;}
.stat{font-size:12px;color:#888;}
.stat b{font-size:18px;font-weight:500;color:#fff;margin-right:2px;}
#yt-bar{padding:10px 12px;display:flex;gap:8px;align-items:center;background:#111;border-top:1px solid #222;}
#yt-bar input{flex:1;font-size:12px;padding:7px 11px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;outline:none;}
#yt-bar input::placeholder{color:#555;}
#yt-bar input:focus{border-color:#534AB7;}
#yt-bar button{font-size:12px;padding:7px 14px;background:#534AB7;border:none;border-radius:8px;color:#fff;cursor:pointer;white-space:nowrap;}
#yt-bar button:hover{background:#7F77DD;}
#msg{text-align:center;padding:7px;font-size:12px;color:#666;min-height:26px;background:#111;}
#ctrl{display:flex;gap:8px;padding:8px 12px 10px;background:#111;}
#ctrl button{flex:1;padding:10px;font-size:14px;font-weight:500;background:rgba(83,74,183,.3);border:1px solid rgba(83,74,183,.6);border-radius:8px;color:#AFA9EC;cursor:pointer;}
#ctrl button:hover{background:rgba(83,74,183,.5);}
#key-hint{text-align:center;font-size:11px;color:#444;padding:0 0 10px;background:#111;}
</style>
</head>
<body>
<div id="gw">
  <div id="hud">
    <div class="stat"><b id="sv">0</b>점</div>
    <div class="stat">콤보 <b id="cv">0</b></div>
    <div class="stat">목숨 <b id="lv">3</b></div>
    <div class="stat">BPM <b id="bv">90</b></div>
  </div>
  <div id="canvas-wrap">
    <div id="yt-bg-player"></div>
    <canvas id="canvas"></canvas>
  </div>
  <div id="yt-bar">
    <input id="yt-url" type="text" placeholder="유튜브 URL (youtu.be/... 또는 youtube.com/watch?v=...) 또는 iframe 코드"/>
    <button id="yt-btn">연동</button>
  </div>
  <div id="msg">시작 버튼을 누르세요</div>
  <div id="ctrl">
    <button id="start-btn">시작</button>
    <button id="stop-btn" style="display:none">종료</button>
  </div>
  <div id="key-hint">← → / A D / 스와이프 / 탭으로 이동</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const LANES = 3;
let W, H, LW, PR, PY;

function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  canvas.width = W;
  canvas.height = H;
  LW = W / LANES;
  PR = Math.round(W * 0.048);
  PY = H - Math.round(H * 0.18);
}

window.addEventListener('load', resizeCanvas);
window.addEventListener('resize', resizeCanvas);
setTimeout(resizeCanvas, 100);

let state='idle', score=0, combo=0, lives=3, bpm=90;
let playerLane=1, objects=[], particles=[];
let beat=0, lastBeat=0, beatInt=60000/bpm;
let hitFlash=0, shakeX=0, shakeY=0, bgPulse=0;
let animId, touchStartX=0, lastMoveTime=0;
let ytBgPlayer=null, ytBgReady=false, ytActive=false;
let audioCtx=null, beatTimer=null, beatCount=0;
let pendingVideoId=null;

function lx(l){return LW*l+LW/2;}

function spawnObj(){
  const lane=Math.floor(Math.random()*LANES);
  const good=Math.random()<0.18;
  objects.push({
    lane, y:-20,
    r: good ? PR*0.65 : PR*0.88,
    type: good?'good':'bad',
    color: good?'#1D9E75':['#D85A30','#993C1D','#D4537E'][lane],
    speed: (3+score/250)*(H/500),
    pulse:0
  });
}

function spawnParts(x,y,col,n=8){
  for(let i=0;i<n;i++){
    const a=Math.PI*2*i/n+Math.random()*.3;
    particles.push({x,y,color:col,
      vx:Math.cos(a)*(2+Math.random()*3),
      vy:Math.sin(a)*(2+Math.random()*3),
      life:1, decay:.04+Math.random()*.03, r:3+Math.random()*3});
  }
}

function drawBg(){
  ctx.fillStyle = ytActive ? 'rgba(5,5,20,.72)' : '#0D0D1A';
  ctx.fillRect(0,0,W,H);
  for(let l=0;l<LANES;l++){
    ctx.fillStyle = l===playerLane ? `rgba(83,74,183,${.07+bgPulse*.06})` : 'rgba(255,255,255,.02)';
    ctx.fillRect(l*LW,0,LW,H);
    if(l>0){
      ctx.strokeStyle='rgba(255,255,255,.06)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(l*LW,0); ctx.lineTo(l*LW,H); ctx.stroke();
    }
  }
  const off=(Date.now()/18)%40;
  for(let y2=0;y2<H;y2+=40){
    ctx.strokeStyle=`rgba(83,74,183,${.03+bgPulse*.04})`; ctx.lineWidth=.5;
    ctx.beginPath(); ctx.moveTo(0,(y2+off)%H); ctx.lineTo(W,(y2+off)%H); ctx.stroke();
  }
}

function drawPlayer(){
  const x=lx(playerLane), p=1+bgPulse*.1;
  ctx.save(); ctx.shadowColor='#534AB7'; ctx.shadowBlur=14+bgPulse*8;
  ctx.beginPath();
  ctx.moveTo(x, PY-PR*1.4*p);
  ctx.lineTo(x+PR*p, PY+PR*.7*p);
  ctx.lineTo(x-PR*p, PY+PR*.7*p);
  ctx.closePath(); ctx.fillStyle='#7F77DD'; ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x, PY-PR*1.1*p);
  ctx.lineTo(x+PR*.6*p, PY+PR*.4*p);
  ctx.lineTo(x-PR*.6*p, PY+PR*.4*p);
  ctx.closePath(); ctx.fillStyle='#AFA9EC'; ctx.fill();
  ctx.restore();
}

function drawObjs(){
  objects.forEach(o=>{
    const x=lx(o.lane); ctx.save();
    if(o.type==='bad'){
      ctx.shadowColor=o.color; ctx.shadowBlur=8+o.pulse*6;
      ctx.beginPath();
      for(let i=0;i<10;i++){
        const a=Math.PI/5*i-Math.PI/2, r=i%2===0?o.r:o.r*.42;
        i===0?ctx.moveTo(x+Math.cos(a)*r,o.y+Math.sin(a)*r):ctx.lineTo(x+Math.cos(a)*r,o.y+Math.sin(a)*r);
      }
      ctx.closePath(); ctx.fillStyle=o.color; ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,.55)'; ctx.lineWidth=1.5;
      const s=o.r*.32;
      ctx.beginPath(); ctx.moveTo(x-s,o.y-s); ctx.lineTo(x+s,o.y+s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+s,o.y-s); ctx.lineTo(x-s,o.y+s); ctx.stroke();
    } else {
      ctx.shadowColor='#1D9E75'; ctx.shadowBlur=10;
      ctx.beginPath(); ctx.arc(x,o.y,o.r,0,Math.PI*2);
      ctx.fillStyle='#1D9E75'; ctx.fill();
      ctx.strokeStyle='#9FE1CB'; ctx.lineWidth=2; ctx.stroke();
      ctx.fillStyle='#E1F5EE'; ctx.font=`bold ${Math.round(o.r*1.1)}px sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('+',x,o.y);
    }
    ctx.restore();
  });
}

function drawParts(){
  particles.forEach(p=>{
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
    ctx.fillStyle=p.color; ctx.fill(); ctx.restore();
  });
}

function drawHUD(){
  if(hitFlash>0){ctx.fillStyle=`rgba(216,90,48,${hitFlash*.3})`; ctx.fillRect(0,0,W,H);}
  ctx.fillStyle='rgba(127,119,221,.5)';
  ctx.fillRect(0,H-4,W*Math.min(combo/20,1),4);
  for(let l=0;l<LANES;l++){
    ctx.fillStyle=l===playerLane?'rgba(127,119,221,.22)':'rgba(255,255,255,.03)';
    ctx.beginPath(); ctx.roundRect(l*LW+5,H-PR*2.8,LW-10,PR*2.4,6); ctx.fill();
  }
  if(ytActive){
    ctx.fillStyle='rgba(255,50,50,.9)';
    ctx.beginPath(); ctx.arc(W-16,16,7,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.8)'; ctx.font='11px sans-serif';
    ctx.textAlign='right'; ctx.textBaseline='middle'; ctx.fillText('YT',W-27,16);
  }
  const bp=Math.max(0,1-(Date.now()-lastBeat)/(beatInt*.5));
  ctx.save(); ctx.globalAlpha=bp*.35; ctx.strokeStyle='#534AB7'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(W/2,H/2,W*.22+bp*W*.05,0,Math.PI*2); ctx.stroke(); ctx.restore();
  const fs=Math.max(10,Math.round(W*.022));
  ctx.font=`${fs}px sans-serif`; ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillStyle='rgba(216,90,48,.85)'; ctx.fillText('★ 피하기',8,8);
  ctx.fillStyle='rgba(29,158,117,.85)'; ctx.fillText('● 먹기',8,8+fs+4);
}

function update(now){
  bgPulse*=.88; hitFlash=Math.max(0,hitFlash-.05); shakeX*=.7; shakeY*=.7;
  if(now-lastBeat>beatInt){
    lastBeat=now; beat++; bgPulse=1;
    if(beat%2===0) spawnObj();
    if(beat%8===0&&bpm<160){bpm+=2; beatInt=60000/bpm; document.getElementById('bv').textContent=bpm;}
  }
  objects.forEach(o=>{o.y+=o.speed; o.pulse=bgPulse;});
  particles.forEach(p=>{p.x+=p.vx; p.y+=p.vy; p.vy+=.1; p.life-=p.decay;});
  particles=particles.filter(p=>p.life>0);
  const px=lx(playerLane);
  objects=objects.filter(o=>{
    if(o.y>H+30) return false;
    const ox=lx(o.lane), dist=Math.sqrt((ox-px)**2+(o.y-PY)**2);
    if(dist<o.r+PR-4){
      if(o.type==='bad'){
        lives--; document.getElementById('lv').textContent=lives;
        combo=0; document.getElementById('cv').textContent=0;
        hitFlash=1; shakeX=8; shakeY=6;
        spawnParts(ox,o.y,'#D85A30',12);
        if(lives<=0) endGame();
      } else {
        const bonus=50+(combo>5?50:0);
        score+=bonus; combo++;
        document.getElementById('sv').textContent=score;
        document.getElementById('cv').textContent=combo;
        spawnParts(ox,o.y,'#1D9E75',8);
      }
      return false;
    }
    return true;
  });
}

function draw(){
  ctx.save();
  ctx.translate(shakeX*(Math.random()-.5)*2, shakeY*(Math.random()-.5)*2);
  drawBg(); drawObjs(); drawParts(); drawPlayer(); drawHUD();
  ctx.restore();
}

function loop(now){
  if(state!=='playing') return;
  update(now); draw(); animId=requestAnimationFrame(loop);
}

function setMsg(t){document.getElementById('msg').textContent=t;}

function startGame(){
  resizeCanvas();
  score=0; combo=0; lives=3; beat=0; bpm=90; beatInt=60000/bpm;
  objects=[]; particles=[]; playerLane=1;
  hitFlash=0; shakeX=0; shakeY=0; bgPulse=0;
  document.getElementById('sv').textContent=0;
  document.getElementById('cv').textContent=0;
  document.getElementById('lv').textContent=3;
  document.getElementById('bv').textContent=90;
  setMsg('★ 별은 피하고   ● 초록 원은 먹으세요!');
  document.getElementById('start-btn').textContent='재시작';
  document.getElementById('stop-btn').style.display='inline-block';
  state='playing'; lastBeat=performance.now();
  startAudio();
  if(ytBgPlayer&&ytBgReady) ytBgPlayer.playVideo();
  requestAnimationFrame(loop);
}

function endGame(){
  state='idle'; cancelAnimationFrame(animId);
  setMsg(`게임 오버! 최종 점수: ${score}점`);
  document.getElementById('stop-btn').style.display='none';
  ctx.fillStyle='rgba(0,0,0,.7)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#AFA9EC'; ctx.font=`500 ${Math.round(W*.06)}px sans-serif`;
  ctx.fillText('GAME OVER',W/2,H/2-H*.05);
  ctx.fillStyle='#7F77DD'; ctx.font=`${Math.round(W*.045)}px sans-serif`;
  ctx.fillText(`${score}점`,W/2,H/2+H*.04);
  stopAudio();
  if(ytBgPlayer&&ytBgReady) ytBgPlayer.pauseVideo();
}

document.getElementById('start-btn').addEventListener('click',startGame);
document.getElementById('stop-btn').addEventListener('click',endGame);

function move(dir){
  if(state!=='playing') return;
  const now=Date.now(); if(now-lastMoveTime<80) return;
  lastMoveTime=now; playerLane=Math.max(0,Math.min(LANES-1,playerLane+dir));
}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') move(-1);
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') move(1);
});
canvas.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});
canvas.addEventListener('touchend',e=>{
  if(state!=='playing') return;
  const dx=e.changedTouches[0].clientX-touchStartX, now=Date.now();
  if(Math.abs(dx)<15&&now-lastMoveTime>150){
    const rect=canvas.getBoundingClientRect();
    const tl=Math.floor((e.changedTouches[0].clientX-rect.left)/rect.width*LANES);
    playerLane=tl!==playerLane?Math.max(0,Math.min(LANES-1,tl)):(playerLane===1?(Math.random()<.5?0:2):1);
  } else if(dx<-20) move(-1);
  else if(dx>20) move(1);
  lastMoveTime=Date.now();
},{passive:true});
canvas.addEventListener('click',e=>{
  if(state!=='playing') return;
  const rect=canvas.getBoundingClientRect();
  const tl=Math.floor((e.clientX-rect.left)/rect.width*LANES);
  if(tl!==playerLane) playerLane=Math.max(0,Math.min(LANES-1,tl));
});

function extractYtId(input){
  const iframeSrc=input.match(/src="([^"]+)"/);
  const url=iframeSrc?iframeSrc[1]:input;
  const m=url.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
  return m?m[1]:null;
}

document.getElementById('yt-btn').addEventListener('click',()=>{
  const input=document.getElementById('yt-url').value.trim();
  if(!input){setMsg('URL을 입력해주세요'); return;}
  const id=extractYtId(input);
  if(!id){setMsg('유효한 유튜브 URL이 아닙니다'); return;}
  pendingVideoId=id;
  if(ytBgPlayer){ytBgPlayer.loadVideoById(id); ytActive=true; setMsg('연동됨. 시작하면 배경+음악 재생!');}
  else setMsg('유튜브 API 연결 중...');
});

window.onYouTubeIframeAPIReady=function(){
  ytBgPlayer=new YT.Player('yt-bg-player',{
    height:'100%', width:'100%',
    videoId: pendingVideoId||'',
    playerVars:{autoplay:0,controls:0,disablekb:1,fs:0,rel:0,playsinline:1,modestbranding:1},
    events:{
      onReady:()=>{ytBgReady=true; if(pendingVideoId){ytActive=true; setMsg('연동됨. 시작하면 배경+음악 재생!');}},
      onError:()=>{setMsg('유튜브 로드 실패. 임베드 허용 영상을 사용해주세요.'); ytActive=false;}
    }
  });
};
const tag=document.createElement('script'); tag.src='https://www.youtube.com/iframe_api'; document.head.appendChild(tag);

function startAudio(){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)(); beatCount=0; scheduleBeat();}catch(e){}}
function stopAudio(){if(beatTimer)clearTimeout(beatTimer); if(audioCtx){audioCtx.close(); audioCtx=null;}}
function playKick(t){if(!audioCtx)return; const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(40,t+.1); g.gain.setValueAtTime(ytActive?.1:.45,t); g.gain.exponentialRampToValueAtTime(.001,t+.2); o.start(t); o.stop(t+.2);}
function playHat(t){if(!audioCtx||ytActive)return; const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*.05,audioCtx.sampleRate),d=buf.getChannelData(0); for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1; const src=audioCtx.createBufferSource(),g=audioCtx.createGain(),f=audioCtx.createBiquadFilter(); f.type='highpass'; f.frequency.value=8000; src.buffer=buf; src.connect(f); f.connect(g); g.connect(audioCtx.destination); g.gain.setValueAtTime(.13,t); g.gain.exponentialRampToValueAtTime(.001,t+.05); src.start(t);}
function playBass(t){if(!audioCtx)return; const o=audioCtx.createOscillator(),g=audioCtx.createGain(),f=audioCtx.createBiquadFilter(); o.type='sawtooth'; f.type='lowpass'; f.frequency.value=400; o.connect(f); f.connect(g); g.connect(audioCtx.destination); o.frequency.setValueAtTime(80,t); g.gain.setValueAtTime(ytActive?.04:.18,t); g.gain.exponentialRampToValueAtTime(.001,t+.15); o.start(t); o.stop(t+.2);}
function scheduleBeat(){
  if(!audioCtx||state!=='playing') return;
  const t=audioCtx.currentTime, pat=beatCount%4;
  if(pat===0){playKick(t); playBass(t);}
  if(pat===2) playKick(t);
  playHat(t);
  if(!ytActive&&(pat===1||pat===3)){const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type='triangle'; o.frequency.value=[220,277,330,415][Math.floor(beatCount/4)%4]; o.connect(g); g.connect(audioCtx.destination); g.gain.setValueAtTime(.07,t); g.gain.exponentialRampToValueAtTime(.001,t+.12); o.start(t); o.stop(t+.15);}
  beatCount++; beatTimer=setTimeout(scheduleBeat,60000/bpm);
}
</script>
</body>
</html>
