<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beat Dodge</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;user-select:none;}
body{background:#000;display:flex;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
#gw{width:100%;max-width:640px;}
#hud{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;background:#0a0a0f;}
.stat{font-size:11px;color:#666;text-align:center;}
.stat b{display:block;font-size:16px;font-weight:600;color:#fff;}
#grade-display{font-size:28px;font-weight:700;min-width:36px;text-align:center;}
#canvas-wrap{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;background:#000;}
#yt-iframe-container{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;}
#yt-iframe-container iframe{width:100%;height:100%;border:none;display:block;}
#canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;}
#yt-bar{padding:8px 12px;display:flex;gap:8px;background:#0a0a0f;border-top:1px solid #1a1a2e;}
#yt-bar input{flex:1;font-size:12px;padding:6px 10px;background:#111;border:1px solid #222;border-radius:7px;color:#fff;outline:none;}
#yt-bar input:focus{border-color:#534AB7;}
#yt-bar input::placeholder{color:#444;}
#yt-bar button{font-size:12px;padding:6px 12px;background:#534AB7;border:none;border-radius:7px;color:#fff;cursor:pointer;}
#msg{text-align:center;padding:6px;font-size:12px;color:#555;background:#0a0a0f;min-height:24px;}
#ctrl{display:flex;gap:8px;padding:6px 12px 10px;background:#0a0a0f;}
#ctrl button{flex:1;padding:9px;font-size:13px;font-weight:500;background:rgba(83,74,183,.25);border:1px solid rgba(83,74,183,.5);border-radius:8px;color:#AFA9EC;cursor:pointer;}
#ctrl button:hover{background:rgba(83,74,183,.4);}
#key-hint{text-align:center;font-size:10px;color:#333;padding:0 0 8px;background:#0a0a0f;}
#stage-banner{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
</style>
</head>
<body>
<div id="gw">
  <div id="hud">
    <div class="stat">점수<b id="sv">0</b></div>
    <div class="stat">스테이지<b id="stv">1</b></div>
    <div class="stat">콤보<b id="cv">0</b></div>
    <div class="stat">배율<b id="mv">x1</b></div>
    <div class="stat">목숨<b id="lv">3</b></div>
    <div id="grade-display">—</div>
  </div>
  <div id="canvas-wrap">
    <div id="yt-iframe-container"></div>
    <canvas id="canvas"></canvas>
  </div>
  <div id="yt-bar">
    <input id="yt-url" type="text" placeholder="유튜브 URL 또는 iframe 코드"/>
    <button id="yt-btn">연동</button>
  </div>
  <div id="bpm-bar" style="padding:8px 12px 0;display:flex;gap:8px;align-items:center;background:#0a0a0f;">
    <span style="font-size:11px;color:#555;white-space:nowrap;">곡 BPM</span>
    <input id="bpm-input" type="number" min="60" max="220" placeholder="예: 128" style="width:72px;font-size:12px;padding:6px 10px;background:#111;border:1px solid #222;border-radius:7px;color:#fff;outline:none;"/>
    <button id="bpm-btn" style="font-size:12px;padding:6px 14px;background:#1D9E75;border:none;border-radius:7px;color:#fff;cursor:pointer;">적용</button>
    <span id="bpm-status" style="font-size:11px;color:#555;flex:1;"></span>
  </div>
  <div id="diff-bar" style="display:flex;gap:6px;padding:8px 12px 0;background:#0a0a0f;">
    <span style="font-size:11px;color:#555;line-height:30px;margin-right:2px;">난이도</span>
    <button class="diff-btn" data-d="easy"  style="flex:1;padding:6px;font-size:12px;font-weight:500;border-radius:7px;border:1px solid #333;background:rgba(255,255,255,.05);color:#666;cursor:pointer;">이지</button>
    <button class="diff-btn" data-d="normal" style="flex:1;padding:6px;font-size:12px;font-weight:500;border-radius:7px;border:1px solid #333;background:rgba(255,255,255,.05);color:#666;cursor:pointer;">노멀</button>
    <button class="diff-btn" data-d="hard"  style="flex:1;padding:6px;font-size:12px;font-weight:500;border-radius:7px;border:1px solid #333;background:rgba(255,255,255,.05);color:#666;cursor:pointer;">하드</button>
  </div>
  <div id="diff-desc" style="text-align:center;padding:5px;font-size:11px;color:#555;background:#0a0a0f;">난이도를 선택하세요</div>
  <div id="msg">시작 버튼을 누르세요</div>
  <div id="ctrl">
    <button id="start-btn">시작</button>
    <button id="stop-btn" style="display:none">종료</button>
  </div>
  <div id="key-hint">← → / A D / 스와이프 / 탭으로 이동</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const LANES = 3;
let W, H, LW, PR, PY;

function resizeCanvas(){
  const wrap = document.getElementById('canvas-wrap');
  W = wrap.clientWidth; H = wrap.clientHeight;
  canvas.width = W; canvas.height = H;
  LW = W/LANES; PR = Math.round(W*0.044); PY = H - Math.round(H*0.17);
}
window.addEventListener('load', resizeCanvas);
window.addEventListener('resize', resizeCanvas);
setTimeout(resizeCanvas, 50);

// 스테이지 패턴 정의 (각 스테이지마다 고유 패턴)
const STAGES = [
  { // 1: 튜토리얼 - 단순 일정 간격
    name: '튜토리얼',
    bpm: 80,
    totalBeats: 32,
    color: '#534AB7',
    pattern: (beat) => {
      if (beat % 2 === 0) return [{ lane: beat % 3, type: 'bad' }];
      if (beat % 4 === 1) return [{ lane: 1, type: 'good' }];
      return [];
    }
  },
  { // 2: 좌우 교차
    name: '좌우 교차',
    bpm: 95,
    totalBeats: 40,
    color: '#1D9E75',
    pattern: (beat) => {
      const result = [];
      if (beat % 2 === 0) result.push({ lane: beat % 2 === 0 ? (beat/2)%2===0?0:2 : 1, type: 'bad' });
      if (beat % 6 === 3) result.push({ lane: 1, type: 'good' });
      return result;
    }
  },
  { // 3: 양쪽 동시
    name: '양쪽 협공',
    bpm: 105,
    totalBeats: 48,
    color: '#D85A30',
    pattern: (beat) => {
      const result = [];
      if (beat % 4 === 0) { result.push({ lane: 0, type: 'bad' }); result.push({ lane: 2, type: 'bad' }); }
      else if (beat % 4 === 2) result.push({ lane: 1, type: 'bad' });
      if (beat % 8 === 5) result.push({ lane: beat%2===0?0:2, type: 'good' });
      return result;
    }
  },
  { // 4: 세 개 동시 + 빈 레인
    name: '빈 레인 찾기',
    bpm: 115,
    totalBeats: 48,
    color: '#D4537E',
    pattern: (beat) => {
      const result = [];
      if (beat % 3 === 0) {
        const safe = beat % 3 === 0 ? (Math.floor(beat/3))%3 : 1;
        for (let l = 0; l < 3; l++) if (l !== safe) result.push({ lane: l, type: 'bad' });
      }
      if (beat % 5 === 2) result.push({ lane: 1, type: 'good' });
      return result;
    }
  },
  { // 5: 보스 - 빠르고 복잡
    name: '보스',
    bpm: 130,
    totalBeats: 64,
    color: '#E24B4A',
    pattern: (beat) => {
      const result = [];
      const p = beat % 8;
      if (p === 0) { result.push({ lane: 0, type: 'bad' }); result.push({ lane: 2, type: 'bad' }); }
      else if (p === 1) result.push({ lane: 1, type: 'bad' });
      else if (p === 2) { result.push({ lane: 0, type: 'bad' }); result.push({ lane: 1, type: 'bad' }); }
      else if (p === 3) result.push({ lane: 2, type: 'bad' });
      else if (p === 4) { for(let l=0;l<3;l++) result.push({ lane: l, type: 'bad' }); }
      else if (p === 5) result.push({ lane: beat%3, type: 'good' });
      else if (p === 6) { result.push({ lane: 1, type: 'bad' }); result.push({ lane: 2, type: 'bad' }); }
      else if (p === 7) result.push({ lane: 0, type: 'bad' });
      return result;
    }
  }
];

let state = 'idle';
let score = 0, combo = 0, multiplier = 1, lives = 3;
let stageIdx = 0, stageBeat = 0;
let objects = [], particles = [], floatTexts = [];
let lastBeat = 0, beatInt = 750;
let hitFlash = 0, shakeX = 0, shakeY = 0, bgPulse = 0;
let animId, touchStartX = 0, lastMoveTime = 0;
let ytActive = false;
let customBpm = 0; // 0 = 스테이지 기본값 사용
let difficulty = 'normal'; // easy / normal / hard
const DIFF = {
  easy:   { livesStart: 5, bpmMult: 1.10, spawnRate: 2, goodRate: 0.22, scoreRate: 0.8,  label: '이지',  desc: '목숨 5개 · 적당한 속도 · 패턴 여유',           color: '#1D9E75' },
  normal: { livesStart: 3, bpmMult: 1.45, spawnRate: 2, goodRate: 0.16, scoreRate: 1.0,  label: '노멀',  desc: '목숨 3개 · 빠른 속도 · 기본 패턴',              color: '#534AB7' },
  hard:   { livesStart: 2, bpmMult: 2.00, spawnRate: 1, goodRate: 0.10, scoreRate: 1.5,  label: '하드',  desc: '목숨 2개 · 속도 2배 · 패턴 빽빽 · 점수 x1.5',   color: '#E24B4A' }
};
let audioCtx = null, beatTimer = null, beatCount = 0;
let stageClearing = false, stageTransTimer = null;
let totalScore = 0, stageHits = 0, stageTotal = 0;
let playerLane = 1;

// 등급 계산
function calcGrade(ratio) {
  if (ratio >= 0.95) return { g: 'S', color: '#FFD700' };
  if (ratio >= 0.85) return { g: 'A', color: '#AFA9EC' };
  if (ratio >= 0.70) return { g: 'B', color: '#1D9E75' };
  if (ratio >= 0.50) return { g: 'C', color: '#D85A30' };
  return { g: 'D', color: '#E24B4A' };
}

function updateMultiplier() {
  if (combo >= 20) multiplier = 4;
  else if (combo >= 10) multiplier = 3;
  else if (combo >= 5) multiplier = 2;
  else multiplier = 1;
  document.getElementById('mv').textContent = `x${multiplier}`;
}

function lx(l) { return LW * l + LW / 2; }

function spawnFromPattern(patternItems) {
  patternItems.forEach(item => {
    objects.push({
      lane: item.lane, y: -20,
      r: item.type === 'good' ? PR * 0.65 : PR * 0.85,
      type: item.type,
      color: item.type === 'good' ? '#1D9E75' : STAGES[stageIdx].color,
      speed: (H / 320) * ((customBpm > 0 ? customBpm : STAGES[stageIdx].bpm) / 80) * DIFF[difficulty].bpmMult,
      pulse: 0
    });
    if (item.type === 'bad') stageTotal++;
  });
}

function spawnParts(x, y, col, n = 8) {
  for (let i = 0; i < n; i++) {
    const a = Math.PI * 2 * i / n + Math.random() * .3;
    particles.push({ x, y, color: col, vx: Math.cos(a) * (2 + Math.random() * 3), vy: Math.sin(a) * (2 + Math.random() * 3), life: 1, decay: .04 + Math.random() * .03, r: 3 + Math.random() * 3 });
  }
}

function addFloatText(x, y, text, color) {
  floatTexts.push({ x, y, text, color, life: 1, vy: -1.5 });
}

function drawBg() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = ytActive ? 'rgba(5,5,20,0.58)' : 'rgba(10,10,20,0.97)';
  ctx.fillRect(0, 0, W, H);

  const stColor = STAGES[stageIdx].color;
  for (let l = 0; l < LANES; l++) {
    ctx.fillStyle = l === playerLane ? `rgba(83,74,183,${.055 + bgPulse * .05})` : 'rgba(255,255,255,.012)';
    ctx.fillRect(l * LW, 0, LW, H);
    if (l > 0) {
      ctx.strokeStyle = 'rgba(255,255,255,.07)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(l * LW, 0); ctx.lineTo(l * LW, H); ctx.stroke();
    }
  }
  // 스테이지 테마 라인
  const off = (Date.now() / 16) % 50;
  for (let y2 = 0; y2 < H; y2 += 50) {
    ctx.strokeStyle = `rgba(${hexToRgb(stColor)},${.025 + bgPulse * .04})`; ctx.lineWidth = .5;
    ctx.beginPath(); ctx.moveTo(0, (y2 + off) % H); ctx.lineTo(W, (y2 + off) % H); ctx.stroke();
  }
  // 비트 링
  const bp = Math.max(0, 1 - (Date.now() - lastBeat) / (beatInt * .5));
  ctx.save(); ctx.globalAlpha = bp * .25; ctx.strokeStyle = stColor; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(W / 2, H / 2, W * .2 + bp * W * .06, 0, Math.PI * 2); ctx.stroke();
  ctx.restore();
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
  return `${r},${g},${b}`;
}

function drawPlayer() {
  const x = lx(playerLane), p = 1 + bgPulse * .1;
  const col = STAGES[stageIdx].color;
  ctx.save(); ctx.shadowColor = col; ctx.shadowBlur = 14 + bgPulse * 8;
  ctx.beginPath(); ctx.moveTo(x, PY - PR * 1.4 * p); ctx.lineTo(x + PR * p, PY + PR * .7 * p); ctx.lineTo(x - PR * p, PY + PR * .7 * p); ctx.closePath(); ctx.fillStyle = '#7F77DD'; ctx.fill();
  ctx.beginPath(); ctx.moveTo(x, PY - PR * 1.1 * p); ctx.lineTo(x + PR * .6 * p, PY + PR * .4 * p); ctx.lineTo(x - PR * .6 * p, PY + PR * .4 * p); ctx.closePath(); ctx.fillStyle = '#AFA9EC'; ctx.fill();
  ctx.restore();
}

function drawObjs() {
  objects.forEach(o => {
    const x = lx(o.lane); ctx.save();
    if (o.type === 'bad') {
      ctx.shadowColor = o.color; ctx.shadowBlur = 8 + o.pulse * 6;
      ctx.beginPath();
      for (let i = 0; i < 10; i++) { const a = Math.PI / 5 * i - Math.PI / 2, r = i % 2 === 0 ? o.r : o.r * .42; i === 0 ? ctx.moveTo(x + Math.cos(a) * r, o.y + Math.sin(a) * r) : ctx.lineTo(x + Math.cos(a) * r, o.y + Math.sin(a) * r); }
      ctx.closePath(); ctx.fillStyle = o.color; ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,.5)'; ctx.lineWidth = 1.5;
      const s = o.r * .28;
      ctx.beginPath(); ctx.moveTo(x - s, o.y - s); ctx.lineTo(x + s, o.y + s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x + s, o.y - s); ctx.lineTo(x - s, o.y + s); ctx.stroke();
    } else {
      ctx.shadowColor = '#1D9E75'; ctx.shadowBlur = 12;
      ctx.beginPath(); ctx.arc(x, o.y, o.r, 0, Math.PI * 2); ctx.fillStyle = '#1D9E75'; ctx.fill();
      ctx.strokeStyle = '#9FE1CB'; ctx.lineWidth = 2; ctx.stroke();
      ctx.fillStyle = '#fff'; ctx.font = `bold ${Math.round(o.r)}px sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('+', x, o.y);
    }
    ctx.restore();
  });
}

function drawParts() {
  particles.forEach(p => { ctx.save(); ctx.globalAlpha = p.life; ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2); ctx.fillStyle = p.color; ctx.fill(); ctx.restore(); });
}

function drawFloatTexts() {
  floatTexts.forEach(t => {
    ctx.save(); ctx.globalAlpha = t.life; ctx.font = `bold ${Math.round(W * .028)}px sans-serif`;
    ctx.fillStyle = t.color; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(t.text, t.x, t.y); ctx.restore();
  });
}

function drawHUD() {
  if (hitFlash > 0) { ctx.fillStyle = `rgba(216,90,48,${hitFlash * .3})`; ctx.fillRect(0, 0, W, H); }
  // 콤보 게이지
  ctx.fillStyle = `rgba(${hexToRgb(STAGES[stageIdx].color)},.45)`;
  ctx.fillRect(0, H - 4, W * Math.min(combo / 20, 1), 4);
  // 레인 하이라이트
  for (let l = 0; l < LANES; l++) {
    ctx.fillStyle = l === playerLane ? 'rgba(127,119,221,.18)' : 'rgba(255,255,255,.025)';
    ctx.beginPath(); ctx.roundRect(l * LW + 4, H - PR * 2.6, LW - 8, PR * 2.2, 5); ctx.fill();
  }
  // 스테이지 진행 바
  const prog = stageBeat / STAGES[stageIdx].totalBeats;
  ctx.fillStyle = 'rgba(255,255,255,.06)'; ctx.fillRect(0, 0, W, 3);
  ctx.fillStyle = STAGES[stageIdx].color; ctx.fillRect(0, 0, W * prog, 3);
  // 범례
  const fs = Math.max(9, Math.round(W * .02));
  ctx.font = `${fs}px sans-serif`; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillStyle = 'rgba(230,100,60,.85)'; ctx.fillText('★ 피하기', 8, 8);
  ctx.fillStyle = 'rgba(29,200,120,.85)'; ctx.fillText('● 먹기', 8, 8 + fs + 3);
  // 멀티플라이어 표시
  if (multiplier > 1) {
    const colors = ['', '', '#1D9E75', '#534AB7', '#FFD700'];
    ctx.font = `bold ${Math.round(W * .045)}px sans-serif`;
    ctx.fillStyle = colors[multiplier] || '#fff';
    ctx.textAlign = 'right'; ctx.textBaseline = 'top';
    ctx.fillText(`x${multiplier}`, W - 8, 8);
  }
}

function drawStageBanner(text, sub, color, alpha) {
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.fillStyle = 'rgba(0,0,0,.6)'; ctx.fillRect(0, H * .3, W, H * .4);
  ctx.font = `700 ${Math.round(W * .08)}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = color; ctx.fillText(text, W / 2, H / 2 - H * .05);
  ctx.font = `${Math.round(W * .032)}px sans-serif`; ctx.fillStyle = '#aaa';
  ctx.fillText(sub, W / 2, H / 2 + H * .05);
  ctx.restore();
}

let bannerAlpha = 0, bannerData = null, bannerTimer = 0;
function showBanner(text, sub, color, duration = 2000) {
  bannerData = { text, sub, color };
  bannerAlpha = 1;
  clearTimeout(bannerTimer);
  bannerTimer = setTimeout(() => { bannerData = null; }, duration);
}

function updateGradeDisplay() {
  const ratio = stageTotal > 0 ? stageHits / stageTotal : 1;
  const { g, color } = calcGrade(1 - ratio); // ratio = 얼마나 잘 피했나
  const el = document.getElementById('grade-display');
  el.textContent = g; el.style.color = color;
}

function update(now) {
  bgPulse *= .88; hitFlash = Math.max(0, hitFlash - .05); shakeX *= .7; shakeY *= .7;
  if (bannerAlpha > 0) bannerAlpha = Math.max(0, bannerAlpha - .008);

  if (!stageClearing && now - lastBeat > beatInt) {
    lastBeat = now; stageBeat++; bgPulse = 1;
    const stage = STAGES[stageIdx];
    const items = stage.pattern(stageBeat);
    if (items.length > 0) spawnFromPattern(items);
    // 스테이지 클리어 체크
    if (stageBeat >= stage.totalBeats) {
      stageClearing = true;
      setTimeout(() => endStage(), 1200);
    }
    scheduleSingleBeat();
  }

  objects.forEach(o => { o.y += o.speed; o.pulse = bgPulse; });
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += .1; p.life -= p.decay; });
  particles = particles.filter(p => p.life > 0);
  floatTexts.forEach(t => { t.y += t.vy; t.life -= .025; });
  floatTexts = floatTexts.filter(t => t.life > 0);

  const px = lx(playerLane);
  objects = objects.filter(o => {
    if (o.y > H + 30) return false;
    const ox = lx(o.lane), dist = Math.sqrt((ox - px) ** 2 + (o.y - PY) ** 2);
    const hitR = o.type === 'bad' ? Math.min(o.r, PR * 0.7) : o.r + PR * 0.5;
    if (dist < hitR) {
      if (o.type === 'bad') {
        stageHits++;
        lives--; document.getElementById('lv').textContent = lives;
        combo = 0; document.getElementById('cv').textContent = 0;
        updateMultiplier(); updateGradeDisplay();
        hitFlash = 1; shakeX = 10; shakeY = 7;
        spawnParts(ox, o.y, '#D85A30', 12);
        addFloatText(ox, o.y - 20, 'MISS!', '#E24B4A');
        if (lives <= 0) endGame();
      } else {
        const base = Math.round(100 * DIFF[difficulty].scoreRate);
        const pts = base * multiplier;
        score += pts; combo++;
        document.getElementById('sv').textContent = score;
        document.getElementById('cv').textContent = combo;
        updateMultiplier(); updateGradeDisplay();
        spawnParts(ox, o.y, '#1D9E75', 8);
        addFloatText(ox, o.y - 20, `+${pts}`, combo > 9 ? '#FFD700' : '#1D9E75');
      }
      return false;
    }
    return true;
  });
}

function endStage() {
  if (state !== 'playing') return;
  const stage = STAGES[stageIdx];
  const dodgeRatio = stageTotal > 0 ? 1 - stageHits / stageTotal : 1;
  const { g, color } = calcGrade(dodgeRatio);
  const bonus = { S: 5000, A: 3000, B: 1500, C: 500, D: 0 }[g];
  score += bonus;
  document.getElementById('sv').textContent = score;

  if (stageIdx < STAGES.length - 1) {
    showBanner(`STAGE ${stageIdx + 1} CLEAR!`, `등급: ${g}  보너스: +${bonus}점  다음 스테이지로...`, color, 2500);
    setTimeout(() => nextStage(), 2600);
  } else {
    showBanner('ALL CLEAR!', `최종 등급: ${g}  총 점수: ${score}점`, '#FFD700', 3000);
    setTimeout(() => endGame(true), 3100);
  }
}

function nextStage() {
  if (state !== 'playing') return;
  stageIdx = Math.min(stageIdx + 1, STAGES.length - 1);
  stageBeat = 0; stageClearing = false; stageHits = 0; stageTotal = 0;
  objects = [];
  const baseBpmN = customBpm > 0 ? customBpm + stageIdx * 8 : STAGES[stageIdx].bpm;
  beatInt = 60000 / (baseBpmN * DIFF[difficulty].bpmMult);
  lastBeat = performance.now();
  document.getElementById('stv').textContent = stageIdx + 1;
  showBanner(`STAGE ${stageIdx + 1}`, STAGES[stageIdx].name, STAGES[stageIdx].color, 1800);
  scheduleSingleBeat();
}

function draw() {
  ctx.save();
  ctx.translate(shakeX * (Math.random() - .5) * 2, shakeY * (Math.random() - .5) * 2);
  drawBg(); drawObjs(); drawParts(); drawPlayer(); drawHUD(); drawFloatTexts();
  if (bannerData && bannerAlpha > 0) drawStageBanner(bannerData.text, bannerData.sub, bannerData.color, bannerAlpha);
  ctx.restore();
}

function loop(now) {
  if (state !== 'playing') return;
  update(now); draw(); animId = requestAnimationFrame(loop);
}

function setMsg(t) { document.getElementById('msg').textContent = t; }

function startGame() {
  resizeCanvas();
  score = 0; combo = 0; multiplier = 1; lives = DIFF[difficulty].livesStart; stageIdx = 0;
  stageBeat = 0; stageClearing = false; stageHits = 0; stageTotal = 0;
  objects = []; particles = []; floatTexts = [];
  playerLane = 1; hitFlash = 0; shakeX = 0; shakeY = 0; bgPulse = 0;
  document.getElementById('sv').textContent = 0;
  document.getElementById('cv').textContent = 0;
  document.getElementById('mv').textContent = 'x1';
  document.getElementById('lv').textContent = DIFF[difficulty].livesStart;
  document.getElementById('stv').textContent = 1;
  document.getElementById('grade-display').textContent = '—';
  document.getElementById('grade-display').style.color = '#fff';
  const baseBpm0 = customBpm > 0 ? customBpm : STAGES[0].bpm;
  beatInt = 60000 / (baseBpm0 * DIFF[difficulty].bpmMult);
  setMsg('★ 별은 피하고   ● 초록 원은 먹으세요!  콤보 쌓으면 배율 UP!');
  document.getElementById('start-btn').textContent = '재시작';
  document.getElementById('stop-btn').style.display = 'inline-block';
  document.getElementById('diff-bar').style.display = 'none';
  document.getElementById('diff-desc').style.display = 'none';
  state = 'playing'; lastBeat = performance.now();
  startAudio();
  resumeYouTube();
  showBanner('STAGE 1', STAGES[0].name, STAGES[0].color, 1600);
  requestAnimationFrame(loop);
}

function stopYouTube() {
  const iframe = document.querySelector('#yt-iframe-container iframe');
  if (iframe) {
    // src를 비워서 재생 즉시 중단
    const src = iframe.src;
    iframe.src = '';
    iframe._lastSrc = src;
  }
}

function resumeYouTube() {
  const iframe = document.querySelector('#yt-iframe-container iframe');
  if (iframe && iframe._lastSrc) iframe.src = iframe._lastSrc;
}

function endGame(clear = false) {
  state = 'idle'; cancelAnimationFrame(animId);
  stopYouTube();
  const dodgeRatio = stageTotal > 0 ? 1 - stageHits / stageTotal : 1;
  const { g, color } = calcGrade(dodgeRatio);
  setMsg(clear ? `ALL CLEAR! 최종 점수: ${score}점  등급: ${g}` : `게임 오버! 점수: ${score}점  등급: ${g}`);
  document.getElementById('stop-btn').style.display = 'none';
  document.getElementById('diff-bar').style.display = 'flex';
  document.getElementById('diff-desc').style.display = 'block';
  ctx.fillStyle = 'rgba(0,0,0,.75)'; ctx.fillRect(0, 0, W, H); ctx.textAlign = 'center';
  ctx.fillStyle = clear ? '#FFD700' : '#AFA9EC';
  ctx.font = `700 ${Math.round(W * .065)}px sans-serif`;
  ctx.fillText(clear ? 'ALL CLEAR!' : 'GAME OVER', W / 2, H / 2 - H * .1);
  ctx.font = `600 ${Math.round(W * .1)}px sans-serif`;
  ctx.fillStyle = color; ctx.fillText(g, W / 2, H / 2 + H * .01);
  ctx.font = `${Math.round(W * .04)}px sans-serif`; ctx.fillStyle = '#aaa';
  ctx.fillText(`${score}점`, W / 2, H / 2 + H * .1);
  stopAudio();
}

// BPM 입력
document.getElementById('bpm-btn').addEventListener('click', () => {
  const val = parseInt(document.getElementById('bpm-input').value);
  if (!val || val < 60 || val > 220) {
    document.getElementById('bpm-status').textContent = '60~220 사이로 입력하세요';
    document.getElementById('bpm-status').style.color = '#E24B4A';
    return;
  }
  customBpm = val;
  // 게임 중이면 즉시 beatInt 갱신
  if (state === 'playing') {
    const base = customBpm + stageIdx * 8;
    beatInt = 60000 / (base * DIFF[difficulty].bpmMult);
  }
  document.getElementById('bpm-status').textContent = `✓ ${val} BPM 적용됨`;
  document.getElementById('bpm-status').style.color = '#1D9E75';
});
document.getElementById('bpm-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('bpm-btn').click();
});

// 난이도 버튼
const diffBtns = document.querySelectorAll('.diff-btn');
function selectDiff(d) {
  difficulty = d;
  const info = DIFF[d];
  diffBtns.forEach(b => {
    const active = b.dataset.d === d;
    b.style.border = active ? `2px solid ${info.color}` : '1px solid #333';
    b.style.background = active ? `rgba(${hexToRgb(info.color)},.25)` : 'rgba(255,255,255,.05)';
    b.style.color = active ? info.color : '#666';
  });
  document.getElementById('diff-desc').textContent = info.desc;
  document.getElementById('diff-desc').style.color = info.color;
}
diffBtns.forEach(b => b.addEventListener('click', () => selectDiff(b.dataset.d)));
selectDiff('normal'); // 기본값

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('stop-btn').addEventListener('click', () => endGame(false));

function move(dir) {
  if (state !== 'playing') return;
  const now = Date.now(); if (now - lastMoveTime < 80) return;
  lastMoveTime = now; playerLane = Math.max(0, Math.min(LANES - 1, playerLane + dir));
}
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') move(-1);
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') move(1);
});
canvas.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
canvas.addEventListener('touchend', e => {
  if (state !== 'playing') return;
  const dx = e.changedTouches[0].clientX - touchStartX, now = Date.now();
  if (Math.abs(dx) < 15 && now - lastMoveTime > 150) {
    const rect = canvas.getBoundingClientRect(), tl = Math.floor((e.changedTouches[0].clientX - rect.left) / rect.width * LANES);
    playerLane = tl !== playerLane ? Math.max(0, Math.min(LANES - 1, tl)) : (playerLane === 1 ? (Math.random() < .5 ? 0 : 2) : 1);
  } else if (dx < -20) move(-1); else if (dx > 20) move(1);
  lastMoveTime = Date.now();
}, { passive: true });
canvas.addEventListener('click', e => {
  if (state !== 'playing') return;
  const rect = canvas.getBoundingClientRect(), tl = Math.floor((e.clientX - rect.left) / rect.width * LANES);
  if (tl !== playerLane) playerLane = Math.max(0, Math.min(LANES - 1, tl));
});

function extractYtId(input) {
  const iframeSrc = input.match(/src="([^"]+)"/);
  const url = iframeSrc ? iframeSrc[1] : input;
  const m = url.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}
document.getElementById('yt-btn').addEventListener('click', () => {
  const input = document.getElementById('yt-url').value.trim();
  if (!input) { setMsg('URL을 입력해주세요'); return; }
  const id = extractYtId(input);
  if (!id) { setMsg('유효한 유튜브 URL이 아닙니다'); return; }
  const container = document.getElementById('yt-iframe-container');
  container.innerHTML = '';
  const iframe = document.createElement('iframe');
  iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1&controls=0&disablekb=1&fs=0&rel=0&playsinline=1&modestbranding=1&loop=1&playlist=${id}`;
  iframe.allow = 'autoplay; encrypted-media';
  container.appendChild(iframe);
  ytActive = true;
  setMsg('연동됨! 시작하면 영상이 배경에 재생됩니다.');
});

function startAudio() { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); beatCount = 0; } catch (e) { } }
function stopAudio() { if (beatTimer) clearTimeout(beatTimer); if (audioCtx) { audioCtx.close(); audioCtx = null; } }

function scheduleSingleBeat() {
  if (!audioCtx || state !== 'playing') return;
  clearTimeout(beatTimer);
  beatTimer = setTimeout(() => {
    if (state !== 'playing' || stageClearing) return;
    const t = audioCtx.currentTime, pat = beatCount % 4;
    if (pat === 0 || pat === 2) {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.frequency.setValueAtTime(pat === 0 ? 150 : 120, t);
      o.frequency.exponentialRampToValueAtTime(40, t + .1);
      g.gain.setValueAtTime(ytActive ? .07 : .4, t);
      g.gain.exponentialRampToValueAtTime(.001, t + .2);
      o.start(t); o.stop(t + .2);
    }
    if (!ytActive && (pat === 1 || pat === 3)) {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = 'triangle'; o.frequency.value = [220, 277, 330, 415][Math.floor(beatCount / 4) % 4];
      o.connect(g); g.connect(audioCtx.destination);
      g.gain.setValueAtTime(.06, t); g.gain.exponentialRampToValueAtTime(.001, t + .1);
      o.start(t); o.stop(t + .12);
    }
    beatCount++;
  }, beatInt * .05);
}
</script>
