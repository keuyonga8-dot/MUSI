<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beat Dodge v5.5</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;user-select:none;}
body{background:#000;display:flex;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#fff;}
#gw{width:100%;max-width:640px;}
#ver{text-align:right;padding:2px 10px;background:#0a0a0f;font-size:11px;color:#888;font-weight:600;}
#hud{display:flex;justify-content:space-between;align-items:center;padding:6px 14px;background:#0a0a0f;}
.stat{font-size:11px;color:#555;text-align:center;}.stat b{display:block;font-size:15px;font-weight:600;color:#fff;}
#grade-display{font-size:24px;font-weight:700;min-width:30px;text-align:center;color:#fff;}
#canvas-wrap{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;background:#000;}
#yt-bg{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;}
#yt-bg iframe{width:100%;height:100%;border:none;display:block;}
#yt-thumb{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;background:#000;overflow:hidden;}
#yt-thumb img{width:100%;height:100%;object-fit:cover;opacity:0.35;}
#canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;}
#result-overlay{display:none;position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;background:rgba(0,0,0,.85);flex-direction:column;align-items:center;justify-content:center;gap:6px;}
#result-title{font-size:14px;color:#aaa;letter-spacing:.05em;}
#result-grade{font-size:72px;font-weight:700;line-height:1;}
#result-score{font-size:26px;font-weight:600;}
#result-detail{font-size:12px;color:#555;margin-top:4px;}
#song-section{background:#0a0a0f;border-top:1px solid #1a1a2e;padding:12px;}
#song-label{font-size:11px;color:#444;margin-bottom:8px;letter-spacing:.04em;}
#song-list{display:flex;gap:8px;overflow-x:auto;overflow-y:hidden;padding-bottom:8px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;touch-action:pan-x;cursor:grab;}
#song-list::-webkit-scrollbar{height:3px;}
#song-list::-webkit-scrollbar-track{background:transparent;}
#song-list::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:2px;}
.sc{flex:0 0 auto;width:90px;cursor:pointer;border-radius:8px;border:1px solid #1e1e2e;background:#111;overflow:hidden;transition:border-color .15s,transform .15s;scroll-snap-align:start;-webkit-tap-highlight-color:transparent;}
.sc:hover{border-color:#534AB7;transform:translateY(-2px);}
.sc.active{border:1.5px solid #7F77DD;background:#15152a;}
.sc img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:#1a1a2e;}
.sc-title{font-size:9px;color:#ccc;padding:5px 5px 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
.sc-meta{font-size:8px;color:#4a4a6a;padding:0 5px 5px;}
#song-preview{display:none;margin-top:8px;background:#111;border:1px solid #1a1a2e;border-radius:8px;padding:10px;gap:10px;align-items:center;}
#pv-img{width:88px;flex:0 0 88px;border-radius:6px;overflow:hidden;}
#pv-img img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;}
#pv-info{flex:1;min-width:0;}
#pv-title{font-size:13px;font-weight:600;margin-bottom:3px;line-height:1.3;}
#pv-bpm{font-size:11px;color:#666;margin-bottom:6px;}
#diff-bar{display:flex;gap:6px;padding:8px 12px 0;background:#0a0a0f;}
#diff-bar>span{font-size:11px;color:#555;line-height:28px;white-space:nowrap;}
.diff-btn{flex:1;padding:5px;font-size:12px;font-weight:500;border-radius:7px;border:1px solid #222;background:rgba(255,255,255,.04);color:#555;cursor:pointer;}
#diff-desc{text-align:center;padding:4px 12px;font-size:11px;color:#555;background:#0a0a0f;}
#msg{text-align:center;padding:6px;font-size:12px;color:#555;background:#0a0a0f;min-height:24px;}
#ctrl{display:flex;gap:6px;padding:6px 12px 10px;background:#0a0a0f;}
#ctrl button{flex:1;padding:9px;font-size:13px;font-weight:500;background:rgba(83,74,183,.22);border:1px solid rgba(83,74,183,.45);border-radius:8px;color:#AFA9EC;cursor:pointer;}
#ctrl button:hover{background:rgba(83,74,183,.38);}
#key-hint{text-align:center;font-size:10px;color:#2a2a2a;padding:0 0 8px;background:#0a0a0f;}
</style>
</head>

function balancedLane(b, w, type){
  // 가장 오래 안 나온 레인 우선, w배열로 타이브레이크
  const preferred = w[b%24];
  if(type==='good') return preferred; // good은 w배열 그대로
  // bad는 가장 오래된 레인 우선
  const ages = laneLastBeat.map((last,i)=>({lane:i, age:b-last}));
  ages.sort((a,z)=>z.age-a.age);
  // 최장 공백 레인, 단 preferred와 너무 다르면 절충
  const oldest = ages[0].lane;
  laneLastBeat[oldest] = b;
  return oldest;
}

function spawnFromPattern(items){
  const goods=items.filter(i=>i.type==='good');
  let bads=items.filter(i=>i.type==='bad');
  // 현재 화면에 살아있는 bad 레인 파악
  const activeBadLanes=new Set(objects.filter(o=>o.type==='bad').map(o=>o.lane));
  // 새 bad를 스폰했을 때 3레인 전부 막히지 않도록 필터
  const safeBads=[];
  for(const b of bads){
    const testLanes=new Set([...activeBadLanes,...safeBads.map(i=>i.lane),b.lane]);
    if(testLanes.size<3) safeBads.push(b); // 추가해도 최대 2레인 이하면 허용
  }
  const finalItems=[...safeBads,...goods];
  finalItems.forEach(i=>{
    // 같은 레인 상단에 이미 오브젝트 있으면 스킵 (겹침 방지)
    if(objects.some(o=>o.lane===i.lane&&o.y<H*0.2)) return;
    objects.push({lane:i.lane,y:-20,r:i.type==='good'?PR*.65:PR*.85,type:i.type,color:i.type==='good'?'#1D9E75':selectedSong.color,speed:(H/320)*(selectedSong.bpm/80)*DIFF[difficulty].bpmMult,pulse:0});
    if(i.type==='bad')stageTotal++;
  });
}

function update(now){
  bgPulse*=.88;hitFlash=Math.max(0,hitFlash-.05);shakeX*=.7;shakeY*=.7;
  if(bannerAlpha>0)bannerAlpha=Math.max(0,bannerAlpha-.007);
  while(!stageClearing&&now-lastBeat>beatInt){
    lastBeat+=beatInt;stageBeat++;bgPulse=1;
    const items=selectedSong.pattern(stageBeat,difficulty);
    if(items.length>0)spawnFromPattern(items);
    if(stageBeat>=getTotalBeats()){stageClearing=true;setTimeout(()=>endGame(true),1200);break;}
    scheduleBeat();
  }
  objects.forEach(o=>{o.y+=o.speed;o.pulse=bgPulse;});
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life-=p.decay;});
  particles=particles.filter(p=>p.life>0);
  floatTexts.forEach(t=>{t.y+=t.vy;t.life-=.022;});
  floatTexts=floatTexts.filter(t=>t.life>0);
  const px=lx(playerLane);
  objects=objects.filter(o=>{
    if(o.y>H+30)return false;
    const ox=lx(o.lane),d=Math.sqrt((ox-px)**2+(o.y-PY)**2);
    const hr=o.type==='bad'?PR*.32:o.r+PR*.4;
    if(d<hr){
      if(o.type==='bad'){stageHits++;lives--;document.getElementById('lv').textContent=lives;combo=0;document.getElementById('cv').textContent=0;updMult();updGrade();hitFlash=1;shakeX=10;shakeY=7;spawnParts(ox,o.y,'#D85A30',12);addFT(ox,o.y-20,'MISS!','#E24B4A');if(lives<=0)endGame(false);}
      else{const pts=Math.round(100*DIFF[difficulty].scoreRate)*multiplier;score+=pts;combo++;document.getElementById('sv').textContent=score;document.getElementById('cv').textContent=combo;updMult();updGrade();spawnParts(ox,o.y,'#1D9E75',8);addFT(ox,o.y-20,`+${pts}`,combo>9?'#FFD700':'#1D9E75');}
      return false;
    }
    return true;
  });
}

  stopAudio();startAudio();ytPlay();
  showBanner(selectedSong.title,'',selectedSong.color||'#534AB7',2000);
  requestAnimationFrame(loop);
}
function endGame(clear=false){
  state='idle';cancelAnimationFrame(animId);ytStop();
  setMsg(clear?`ALL CLEAR! 점수: ${score}점`:`게임 오버! 점수: ${score}점`);
  document.getElementById('stop-btn').style.display='none';
  document.getElementById('diff-bar').style.display='flex';
  document.getElementById('diff-desc').style.display='block';
  document.getElementById('song-section').style.display='block';
  document.getElementById('sv').textContent=0;document.getElementById('cv').textContent=0;
  document.getElementById('mv').textContent='x1';document.getElementById('lv').textContent='—';
  document.getElementById('grade-display').textContent='—';document.getElementById('grade-display').style.color='#fff';
  ctx.clearRect(0,0,W,H);showResult(clear);stopAudio();
}
document.getElementById('start-btn').addEventListener('click',startGame);
document.getElementById('stop-btn').addEventListener('click',()=>endGame(false));

function moveTo(l){if(state!=='playing')return;const n=Date.now();if(n-lastMoveTime<50)return;lastMoveTime=n;playerLane=l;}
function move(d){if(state!=='playing')return;const n=Date.now();if(n-lastMoveTime<80)return;lastMoveTime=n;playerLane=Math.max(0,Math.min(2,playerLane+d));}
document.addEventListener('keydown',e=>{if(state!=='playing')return;if(e.key==='1'||e.key==='z'||e.key==='Z')moveTo(0);else if(e.key==='2'||e.key==='x'||e.key==='X')moveTo(1);else if(e.key==='3'||e.key==='c'||e.key==='C')moveTo(2);else if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')move(-1);else if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')move(1);});
canvas.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});
canvas.addEventListener('touchend',e=>{if(state!=='playing')return;const dx=e.changedTouches[0].clientX-touchStartX,now=Date.now();if(Math.abs(dx)<15&&now-lastMoveTime>150){const rect=canvas.getBoundingClientRect(),tl=Math.floor((e.changedTouches[0].clientX-rect.left)/rect.width*3);playerLane=Math.max(0,Math.min(2,tl));}else if(dx<-20)move(-1);else if(dx>20)move(1);lastMoveTime=Date.now();},{passive:true});
canvas.addEventListener('click',e=>{if(state!=='playing')return;const rect=canvas.getBoundingClientRect(),tl=Math.floor((e.clientX-rect.left)/rect.width*3);if(tl!==playerLane)playerLane=Math.max(0,Math.min(2,tl));});

function startAudio(){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();beatCount=0;}catch(e){}}
function stopAudio(){if(beatTimer)clearTimeout(beatTimer);if(audioCtx){audioCtx.close();audioCtx=null;}}
function scheduleBeat(){
  if(!audioCtx||state!=='playing')return;clearTimeout(beatTimer);
  beatTimer=setTimeout(()=>{if(state!=='playing')return;const t=audioCtx.currentTime,p=beatCount%4;if(p===0||p===2){const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.setValueAtTime(p===0?150:120,t);o.frequency.exponentialRampToValueAtTime(40,t+.1);g.gain.setValueAtTime(ytActive?.07:.4,t);g.gain.exponentialRampToValueAtTime(.001,t+.2);o.start(t);o.stop(t+.2);}if(!ytActive&&(p===1||p===3)){const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='triangle';o.frequency.value=[220,277,330,415][Math.floor(beatCount/4)%4];o.connect(g);g.connect(audioCtx.destination);g.gain.setValueAtTime(.06,t);g.gain.exponentialRampToValueAtTime(.001,t+.1);o.start(t);o.stop(t+.12);}beatCount++;},beatInt*.05);
}

(function(){const el=document.getElementById('song-list');let down=false,startX,scrollLeft;el.addEventListener('mousedown',e=>{down=true;startX=e.pageX-el.offsetLeft;scrollLeft=el.scrollLeft;el.style.cursor='grabbing';});el.addEventListener('mouseleave',()=>{down=false;el.style.cursor='grab';});el.addEventListener('mouseup',()=>{down=false;el.style.cursor='grab';});el.addEventListener('mousemove',e=>{if(!down)return;e.preventDefault();const x=e.pageX-el.offsetLeft;el.scrollLeft=scrollLeft-(x-startX)*1.5;});})();

function buildSongList(){
  const list=document.getElementById('song-list');list.innerHTML='';
  SONGS.forEach((song,i)=>{
    const card=document.createElement('div');card.className='sc'+(i===selectedIdx?' active':'');
    const img=document.createElement('img');img.src=`https://img.youtube.com/vi/${song.ytId}/mqdefault.jpg`;img.alt=song.title;
    const t=document.createElement('div');t.className='sc-title';t.textContent=song.title;
    const m=document.createElement('div');m.className='sc-meta';m.textContent=`${song.bpm} BPM`;
    card.append(img,t,m);card.addEventListener('click',()=>selectSong(i));list.appendChild(card);
  });
}
function selectSong(idx){
  selectedIdx=idx;selectedSong=SONGS[idx];
  document.querySelectorAll('.sc').forEach((c,i)=>c.classList.toggle('active',i===idx));
  document.getElementById('pv-img-el').src=`https://img.youtube.com/vi/${selectedSong.ytId}/mqdefault.jpg`;
  document.getElementById('pv-title').textContent=selectedSong.title;
  document.getElementById('pv-bpm').textContent=`${selectedSong.bpm} BPM`;
  document.getElementById('song-preview').style.display='flex';
  document.getElementById('yt-thumb-img').src=`https://img.youtube.com/vi/${selectedSong.ytId}/mqdefault.jpg`;
  document.getElementById('yt-thumb').style.display='block';
  document.getElementById('yt-bg').innerHTML='';ytActive=false;
  ctx.clearRect(0,0,W,H);hideResult();
  document.getElementById('start-btn').disabled=false;document.getElementById('start-btn').style.opacity='1';
  setMsg(`"${selectedSong.title}" 선택됨. 난이도 고르고 시작!`);
}
buildSongList();

function selectDiff(d){
  difficulty=d;const info=DIFF[d];
  document.querySelectorAll('.diff-btn').forEach(b=>{const on=b.dataset.d===d;b.style.border=on?`2px solid ${info.color}`:'1px solid #222';b.style.background=on?`rgba(${hexRgb(info.color)},.2)`:'rgba(255,255,255,.04)';b.style.color=on?info.color:'#555';});
  document.getElementById('diff-desc').textContent=info.desc;document.getElementById('diff-desc').style.color=info.color;
}
document.querySelectorAll('.diff-btn').forEach(b=>b.addEventListener('click',()=>selectDiff(b.dataset.d)));
selectDiff('normal');
</script>
