body{background:#000;display:flex;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#fff;}
#gw{width:100%;max-width:640px;}
#ver{text-align:right;padding:2px 10px;background:#0a0a0f;font-size:11px;color:#888;font-weight:600;}
#hud{display:flex;justify-content:space-between;align-items:center;padding:6px 14px;background:#0a0a0f;}
.stat{font-size:11px;color:#555;text-align:center;}.stat b{display:block;font-size:15px;font-weight:600;color:#fff;}

#canvas-wrap{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;background:#000;}
#yt-bg{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;}
#yt-bg iframe{width:100%;height:100%;border:none;display:block;}
#yt-thumb{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;background:#000;overflow:hidden;}
#yt-thumb img{width:100%;height:100%;object-fit:cover;opacity:0.35;}
#canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;}
#result-overlay{display:none;position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;background:rgba(0,0,0,.85);flex-direction:column;align-items:center;justify-content:center;gap:6px;}

#result-grade{font-size:72px;font-weight:700;line-height:1;}
#result-score{font-size:26px;font-weight:600;}
#result-detail{font-size:12px;color:#555;margin-top:4px;}
#song-section{background:#0a0a0f;border-top:1px solid #1a1a2e;padding:12px;}
#song-label{font-size:11px;color:#444;margin-bottom:8px;letter-spacing:.04em;}
#song-list{display:flex;gap:8px;overflow-x:auto;overflow-y:hidden;padding-bottom:8px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;touch-action:pan-x;cursor:grab;}
#song-list::-webkit-scrollbar{height:3px;}
#song-list::-webkit-scrollbar-track{background:transparent;}
#song-list::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:2px;}
.sc{flex:0 0 auto;width:90px;cursor:pointer;border-radius:8px;border:1px solid #1e1e2e;background:#111;overflow:hidden;transition:border-color .15s,transform .15s;scroll-snap-align:start;-webkit-tap-highlight-color:transparent;}
.sc:hover{border-color:#534AB7;transform:translateY(-2px);}
.sc.active{border:1.5px solid #7F77DD;background:#15152a;}
.sc img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:#1a1a2e;}
.sc-title{font-size:9px;color:#ccc;padding:5px 5px 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
.sc-meta{font-size:8px;color:#4a4a6a;padding:0 5px 5px;}
#song-preview{display:none;margin-top:8px;background:#111;border:1px solid #1a1a2e;border-radius:8px;padding:10px;gap:10px;align-items:center;}
#pv-img{width:88px;flex:0 0 88px;border-radius:6px;overflow:hidden;}
#pv-img img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;}
#pv-info{flex:1;min-width:0;}
#pv-title{font-size:13px;font-weight:600;margin-bottom:3px;line-height:1.3;}
#pv-bpm{font-size:11px;color:#666;}
#diff-bar{display:flex;gap:6px;padding:8px 12px 0;background:#0a0a0f;}
#diff-bar>span{font-size:11px;color:#555;line-height:28px;white-space:nowrap;}
.diff-btn{flex:1;padding:5px;font-size:12px;font-weight:500;border-radius:7px;border:1px solid #222;background:rgba(255,255,255,.04);color:#555;cursor:pointer;}
#diff-desc{text-align:center;padding:4px 12px;font-size:11px;color:#555;background:#0a0a0f;}
#msg{text-align:center;padding:6px;font-size:12px;color:#555;background:#0a0a0f;min-height:24px;}
#ctrl{display:flex;gap:6px;padding:6px 12px 10px;background:#0a0a0f;}
#ctrl button{flex:1;padding:9px;font-size:13px;font-weight:500;background:rgba(83,74,183,.22);border:1px solid rgba(83,74,183,.45);border-radius:8px;color:#AFA9EC;cursor:pointer;}

#key-hint{text-align:center;font-size:10px;color:#2a2a2a;padding:0 0 8px;background:#0a0a0f;}

// bad 없는 레인 중 b값 기반으로 고르게 분산
function freeLane(items, b) {
  const bad = items.filter(i=>i.type==='bad').map(i=>i.lane);
  const free = [0,1,2].filter(l=>!bad.includes(l));
  if (free.length === 0) return 1;
  // 소수 기반 시퀀스 — 0/1/2 고르게
  const seq = [0,2,1,2,0,1,0,1,2,1,2,0,2,0,1,0,2,1,1,0,2,1,0,2];
  const opts = seq.filter(l=>free.includes(l));
  return opts[b % opts.length];
}

function calcGrade(r){
  if(r>=.95)return{g:'S',c:'#FFD700'};
  if(r>=.85)return{g:'A',c:'#AFA9EC'};
  if(r>=.70)return{g:'B',c:'#1D9E75'};
  if(r>=.50)return{g:'C',c:'#D85A30'};
  return{g:'D',c:'#E24B4A'};
}
function getGrade(){
  if(stageTotal===0)return{g:'—',c:'#555'};
  const dodged=1-stageHits/stageTotal;
  const penalty=lives<=0?0.6:1.0;
  return calcGrade(Math.max(0,dodged*penalty));
}
function updMult(){multiplier=combo>=20?4:combo>=10?3:combo>=5?2:1;document.getElementById('mv').textContent=`x${multiplier}`;}
function updGrade(){const{g,c}=getGrade();const el=document.getElementById('grade-display');el.textContent=g;el.style.color=c;}
function lx(l){return LW*l+LW/2;}
function setMsg(t){document.getElementById('msg').textContent=t;}
function showBanner(t,s,c,d=2000){bannerData={t,s,c};bannerAlpha=1;clearTimeout(bannerTid);bannerTid=setTimeout(()=>bannerData=null,d);}

let goodCooldown = 0; // good 먹은 후 bad 스킵할 비트 수

function spawnFromPattern(items){
  const deduped=[],seen={};
  items.forEach(i=>{
    // good 쿨다운 중이면 bad 스킵 (이동 시간 확보)
    if(goodCooldown>0&&i.type==='bad')return;
    if(seen[i.lane]===undefined){seen[i.lane]=i.type;deduped.push(i);}
    else if(i.type==='good'){const idx=deduped.findIndex(d=>d.lane===i.lane);if(idx>=0)deduped[idx]=i;}
  });
  deduped.forEach(i=>{
    objects.push({lane:i.lane,y:-20,
      r:i.type==='good'?PR*.65:PR*.85,
      type:i.type,
      color:i.type==='good'?'#1D9E75':selectedSong.color,
      speed:(H/320)*(selectedSong.bpm/80)*Math.sqrt(DIFF[difficulty].bpmMult),
      pulse:0});
    if(i.type==='bad')stageTotal++;
  });
}
function spawnParts(x,y,col,n=8){for(let i=0;i<n;i++){const a=Math.PI*2*i/n+Math.random()*.3;particles.push({x,y,color:col,vx:Math.cos(a)*(2+Math.random()*3),vy:Math.sin(a)*(2+Math.random()*3),life:1,decay:.04+Math.random()*.03,r:3+Math.random()*3});}}
function addFT(x,y,t,c){floatTexts.push({x,y,t,c,life:1,vy:-1.5});}

function drawBg(){
  ctx.clearRect(0,0,W,H);
  if(state==='idle'){ctx.fillStyle='rgba(0,0,0,0)';}
  else{ctx.fillStyle=ytActive?'rgba(5,5,20,0.60)':'rgba(10,10,20,0.97)';}
  ctx.fillRect(0,0,W,H);
  const sc=selectedSong?.color||'#534AB7';
  for(let l=0;l<LANES;l++){
    ctx.fillStyle=l===playerLane?`rgba(83,74,183,${.05+bgPulse*.05})`:'rgba(255,255,255,.01)';
    ctx.fillRect(l*LW,0,LW,H);
    if(l>0){ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(l*LW,0);ctx.lineTo(l*LW,H);ctx.stroke();}
  }
  const off=(Date.now()/16)%50;
  for(let y=0;y<H;y+=50){ctx.strokeStyle=`rgba(${hexRgb(sc)},${.02+bgPulse*.03})`;ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(0,(y+off)%H);ctx.lineTo(W,(y+off)%H);ctx.stroke();}
  const bp=Math.max(0,1-(Date.now()-lastBeat)/(beatInt*.5));
  ctx.save();ctx.globalAlpha=bp*.2;ctx.strokeStyle=sc;ctx.lineWidth=2;ctx.beginPath();ctx.arc(W/2,H/2,W*.2+bp*W*.06,0,Math.PI*2);ctx.stroke();ctx.restore();
}
function drawPlayer(){
  const x=lx(playerLane),p=1+bgPulse*.1,col=selectedSong?.color||'#534AB7';
  ctx.save();ctx.shadowColor=col;ctx.shadowBlur=12+bgPulse*7;
  ctx.beginPath();ctx.moveTo(x,PY-PR*1.4*p);ctx.lineTo(x+PR*p,PY+PR*.7*p);ctx.lineTo(x-PR*p,PY+PR*.7*p);ctx.closePath();ctx.fillStyle='#7F77DD';ctx.fill();
  ctx.beginPath();ctx.moveTo(x,PY-PR*1.1*p);ctx.lineTo(x+PR*.6*p,PY+PR*.4*p);ctx.lineTo(x-PR*.6*p,PY+PR*.4*p);ctx.closePath();ctx.fillStyle='#AFA9EC';ctx.fill();
  ctx.restore();
}
function drawObjs(){
  objects.forEach(o=>{
    const x=lx(o.lane);ctx.save();
    if(o.type==='bad'){
      ctx.shadowColor=o.color;ctx.shadowBlur=6+o.pulse*4;ctx.beginPath();
      for(let i=0;i<10;i++){const a=Math.PI/5*i-Math.PI/2,r=i%2===0?o.r:o.r*.42;i===0?ctx.moveTo(x+Math.cos(a)*r,o.y+Math.sin(a)*r):ctx.lineTo(x+Math.cos(a)*r,o.y+Math.sin(a)*r);}
      ctx.closePath();ctx.fillStyle=o.color;ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,.4)';ctx.lineWidth=1.2;
      const s=o.r*.28;ctx.beginPath();ctx.moveTo(x-s,o.y-s);ctx.lineTo(x+s,o.y+s);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x+s,o.y-s);ctx.lineTo(x-s,o.y+s);ctx.stroke();
    } else {
      ctx.shadowColor='#1D9E75';ctx.shadowBlur=9;
      ctx.beginPath();ctx.arc(x,o.y,o.r,0,Math.PI*2);ctx.fillStyle='#1D9E75';ctx.fill();
      ctx.strokeStyle='#9FE1CB';ctx.lineWidth=1.5;ctx.stroke();
      ctx.fillStyle='#fff';ctx.font=`bold ${Math.round(o.r)}px sans-serif`;
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('+',x,o.y);
    }
    ctx.restore();
  });
}
function drawParts(){particles.forEach(p=>{ctx.save();ctx.globalAlpha=p.life;ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();ctx.restore();});}
function drawFTs(){floatTexts.forEach(t=>{ctx.save();ctx.globalAlpha=t.life;ctx.font=`bold ${Math.round(W*.025)}px sans-serif`;ctx.fillStyle=t.c;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(t.t,t.x,t.y);ctx.restore();});}
function drawHUD(){
  if(hitFlash>0){ctx.fillStyle=`rgba(216,90,48,${hitFlash*.28})`;ctx.fillRect(0,0,W,H);}
  const sc=selectedSong?.color||'#534AB7';
  ctx.fillStyle=`rgba(${hexRgb(sc)},.4)`;ctx.fillRect(0,H-4,W*Math.min(combo/20,1),4);
  for(let l=0;l<LANES;l++){
    ctx.fillStyle=l===playerLane?'rgba(127,119,221,.17)':'rgba(255,255,255,.02)';
    ctx.beginPath();ctx.roundRect(l*LW+4,H-PR*2.6,LW-8,PR*2.2,5);ctx.fill();
  }
  // 진행 바
  ctx.fillStyle='rgba(255,255,255,.04)';ctx.fillRect(0,0,W,3);
  ctx.fillStyle=sc;ctx.fillRect(0,0,W*(selectedSong?stageBeat/selectedSong.totalBeats:0),3);
  const fs=Math.max(9,Math.round(W*.02));
  ctx.font=`${fs}px sans-serif`;ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillStyle='rgba(230,100,60,.8)';ctx.fillText('★ 피하기',8,8);
  ctx.fillStyle='rgba(29,200,120,.8)';ctx.fillText('● 먹기',8,8+fs+3);
  if(multiplier>1){
    const mc=['','','#1D9E75','#534AB7','#FFD700'][multiplier];
    ctx.font=`bold ${Math.round(W*.04)}px sans-serif`;ctx.fillStyle=mc;
    ctx.textAlign='right';ctx.textBaseline='top';ctx.fillText(`x${multiplier}`,W-8,8);
  }
  if(ytActive){ctx.fillStyle='rgba(255,50,50,.85)';ctx.beginPath();ctx.arc(W-13,H-13,5,0,Math.PI*2);ctx.fill();}
}
function drawBanner(){
  if(!bannerData||bannerAlpha<=0)return;
  ctx.save();ctx.globalAlpha=bannerAlpha;
  ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(0,H*.3,W,H*.4);
  ctx.font=`700 ${Math.round(W*.072)}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle=bannerData.c;ctx.fillText(bannerData.t,W/2,H/2-H*.04);
  ctx.font=`${Math.round(W*.027)}px sans-serif`;ctx.fillStyle='#aaa';ctx.fillText(bannerData.s,W/2,H/2+H*.05);
  ctx.restore();
}

function showResult(clear){
  const{g,c}=getGrade();
  document.getElementById('result-title').textContent=clear?'ALL CLEAR!':'GAME OVER';
  document.getElementById('result-title').style.color=clear?'#FFD700':'#aaa';
  document.getElementById('result-grade').textContent=g;
  document.getElementById('result-grade').style.color=c;
  document.getElementById('result-score').textContent=`${score.toLocaleString()}점`;
  const pct=stageTotal>0?Math.round((1-stageHits/stageTotal)*100):0;
  document.getElementById('result-detail').textContent=`회피율 ${pct}% · 최대 콤보 ${combo}`;
  document.getElementById('result-overlay').style.display='flex';
}
function hideResult(){document.getElementById('result-overlay').style.display='none';}

function update(now){
  bgPulse*=.88;hitFlash=Math.max(0,hitFlash-.05);shakeX*=.7;shakeY*=.7;
  if(bannerAlpha>0)bannerAlpha=Math.max(0,bannerAlpha-.007);
  if(!stageClearing&&now-lastBeat>beatInt){
    lastBeat=now;stageBeat++;bgPulse=1;
    if(goodCooldown>0)goodCooldown--;
    const items=selectedSong.pattern(stageBeat,difficulty);
    if(items.length>0)spawnFromPattern(items);
    if(stageBeat>=selectedSong.totalBeats){stageClearing=true;setTimeout(()=>endGame(true),1200);}
    scheduleBeat();
  }
  objects.forEach(o=>{o.y+=o.speed;o.pulse=bgPulse;});
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life-=p.decay;});
  particles=particles.filter(p=>p.life>0);
  floatTexts.forEach(t=>{t.y+=t.vy;t.life-=.022;});
  floatTexts=floatTexts.filter(t=>t.life>0);
  const px=lx(playerLane);
  objects=objects.filter(o=>{
    if(o.y>H+30)return false;
    const ox=lx(o.lane),d=Math.sqrt((ox-px)**2+(o.y-PY)**2);
    const hr=o.type==='bad'?PR*.45:o.r+PR*.4;
    if(d<hr){
      if(o.type==='bad'){
        stageHits++;lives--;document.getElementById('lv').textContent=lives;
        combo=0;document.getElementById('cv').textContent=0;
        updMult();updGrade();hitFlash=1;shakeX=10;shakeY=7;
        spawnParts(ox,o.y,'#D85A30',12);addFT(ox,o.y-20,'MISS!','#E24B4A');
        if(lives<=0)endGame(false);
      } else {
        const pts=Math.round(100*DIFF[difficulty].scoreRate)*multiplier;
        score+=pts;combo++;
        document.getElementById('sv').textContent=score;
        document.getElementById('cv').textContent=combo;
        updMult();updGrade();
        spawnParts(ox,o.y,'#1D9E75',8);
        addFT(ox,o.y-20,`+${pts}`,combo>9?'#FFD700':'#1D9E75');
      }
      return false;
    }
    return true;
  });
}
function draw(){
  ctx.save();ctx.translate(shakeX*(Math.random()-.5)*2,shakeY*(Math.random()-.5)*2);
  drawBg();drawObjs();drawParts();drawPlayer();drawHUD();drawFTs();drawBanner();ctx.restore();
}
function loop(now){if(state!=='playing')return;update(now);draw();animId=requestAnimationFrame(loop);}

function ytPlay(){
  document.getElementById('yt-thumb').style.display='none';
  document.getElementById('yt-bg').innerHTML='';
  if(!selectedSong?.ytId)return;
  const iframe=document.createElement('iframe');
  iframe.src=`https://www.youtube.com/embed/${selectedSong.ytId}?autoplay=1&controls=0&disablekb=1&fs=0&rel=0&playsinline=1&modestbranding=1&loop=1&playlist=${selectedSong.ytId}`;
  iframe.allow='autoplay; encrypted-media';
  document.getElementById('yt-bg').appendChild(iframe);
  ytActive=true;
}
function ytStop(){
  document.getElementById('yt-bg').innerHTML='';
  ytActive=false;
  if(selectedSong?.ytId){
    document.getElementById('yt-thumb-img').src=`https://img.youtube.com/vi/${selectedSong.ytId}/mqdefault.jpg`;
    document.getElementById('yt-thumb').style.display='block';
  }
}

function startGame(){
  if(!selectedSong)return;
  cancelAnimationFrame(animId);hideResult();resizeCanvas();
  score=0;combo=0;multiplier=1;lives=DIFF[difficulty].livesStart;
  stageBeat=0;stageClearing=false;stageHits=0;stageTotal=0;goodCooldown=0;
  objects=[];particles=[];floatTexts=[];playerLane=1;
  hitFlash=0;shakeX=0;shakeY=0;bgPulse=0;bannerData=null;
  document.getElementById('sv').textContent=0;
  document.getElementById('cv').textContent=0;
  document.getElementById('lv').textContent=lives;
  document.getElementById('mv').textContent='x1';
  document.getElementById('grade-display').textContent='—';
  document.getElementById('grade-display').style.color='#fff';
  beatInt=60000/(selectedSong.bpm*DIFF[difficulty].bpmMult);
  setMsg('★ 별은 피하고  ● 초록 원은 먹으세요!');
  document.getElementById('start-btn').textContent='재시작';
  document.getElementById('stop-btn').style.display='inline-block';
  document.getElementById('diff-bar').style.display='none';
  document.getElementById('diff-desc').style.display='none';
  document.getElementById('song-section').style.display='none';
  state='playing';lastBeat=performance.now();
  stopAudio();startAudio();ytPlay();
  showBanner(selectedSong.title,'',selectedSong.color||'#534AB7',2000);
  requestAnimationFrame(loop);
}
function endGame(clear=false){
  state='idle';cancelAnimationFrame(animId);
  ytStop();
  document.getElementById('sv').textContent=0;
  document.getElementById('cv').textContent=0;
  document.getElementById('mv').textContent='x1';
  document.getElementById('lv').textContent='—';
  document.getElementById('grade-display').textContent='—';
  document.getElementById('grade-display').style.color='#fff';
  setMsg(clear?`ALL CLEAR! 점수: ${score}점`:`게임 오버! 점수: ${score}점`);
  document.getElementById('stop-btn').style.display='none';
  document.getElementById('diff-bar').style.display='flex';
  document.getElementById('diff-desc').style.display='block';
  document.getElementById('song-section').style.display='block';
  ctx.clearRect(0,0,W,H);
  showResult(clear);
  stopAudio();
}
document.getElementById('start-btn').addEventListener('click',startGame);
document.getElementById('stop-btn').addEventListener('click',()=>endGame(false));

function moveTo(l){if(state!=='playing')return;const n=Date.now();if(n-lastMoveTime<50)return;lastMoveTime=n;playerLane=l;}
function move(d){if(state!=='playing')return;const n=Date.now();if(n-lastMoveTime<80)return;lastMoveTime=n;playerLane=Math.max(0,Math.min(2,playerLane+d));}
document.addEventListener('keydown',e=>{
  if(state!=='playing')return;
  if(e.key==='1'||e.key==='z'||e.key==='Z')moveTo(0);
  else if(e.key==='2'||e.key==='x'||e.key==='X')moveTo(1);
  else if(e.key==='3'||e.key==='c'||e.key==='C')moveTo(2);
  else if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')move(-1);
  else if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')move(1);
});
canvas.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});
canvas.addEventListener('touchend',e=>{
  if(state!=='playing')return;
  const dx=e.changedTouches[0].clientX-touchStartX,now=Date.now();
  if(Math.abs(dx)<15&&now-lastMoveTime>150){
    const rect=canvas.getBoundingClientRect(),tl=Math.floor((e.changedTouches[0].clientX-rect.left)/rect.width*3);
    playerLane=tl!==playerLane?Math.max(0,Math.min(2,tl)):(playerLane===1?(Math.random()<.5?0:2):1);
  } else if(dx<-20)move(-1); else if(dx>20)move(1);
  lastMoveTime=Date.now();
},{passive:true});
canvas.addEventListener('click',e=>{
  if(state!=='playing')return;
  const rect=canvas.getBoundingClientRect(),tl=Math.floor((e.clientX-rect.left)/rect.width*3);
  if(tl!==playerLane)playerLane=Math.max(0,Math.min(2,tl));
});

function startAudio(){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();beatCount=0;}catch(e){}}
function stopAudio(){if(beatTimer)clearTimeout(beatTimer);if(audioCtx){audioCtx.close();audioCtx=null;}}
function scheduleBeat(){
  if(!audioCtx||state!=='playing')return;clearTimeout(beatTimer);
  beatTimer=setTimeout(()=>{
    if(state!=='playing')return;
    const t=audioCtx.currentTime,p=beatCount%4;
    if(p===0||p===2){
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.connect(g);g.connect(audioCtx.destination);
      o.frequency.setValueAtTime(p===0?150:120,t);
      o.frequency.exponentialRampToValueAtTime(40,t+.1);
      g.gain.setValueAtTime(ytActive?.07:.4,t);
      g.gain.exponentialRampToValueAtTime(.001,t+.2);
      o.start(t);o.stop(t+.2);
    }
    if(!ytActive&&(p===1||p===3)){
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type='triangle';o.frequency.value=[220,277,330,415][Math.floor(beatCount/4)%4];
      o.connect(g);g.connect(audioCtx.destination);
      g.gain.setValueAtTime(.06,t);g.gain.exponentialRampToValueAtTime(.001,t+.1);
      o.start(t);o.stop(t+.12);
    }
    beatCount++;
  },beatInt*.05);
}

// 드래그 스크롤
(function(){
  const el = document.getElementById('song-list');
  let down=false, startX, scrollLeft;
  el.addEventListener('mousedown', e=>{down=true;startX=e.pageX-el.offsetLeft;scrollLeft=el.scrollLeft;el.style.cursor='grabbing';});
  el.addEventListener('mouseleave',()=>{down=false;el.style.cursor='grab';});
  el.addEventListener('mouseup',()=>{down=false;el.style.cursor='grab';});
  el.addEventListener('mousemove',e=>{if(!down)return;e.preventDefault();const x=e.pageX-el.offsetLeft;el.scrollLeft=scrollLeft-(x-startX)*1.5;});
})();

function buildSongList(){
  const list=document.getElementById('song-list');
  list.innerHTML='';
  SONGS.forEach((song,i)=>{
    const card=document.createElement('div');
    card.className='sc'+(i===selectedIdx?' active':'');
    const img=document.createElement('img');
    img.src=`https://img.youtube.com/vi/${song.ytId}/mqdefault.jpg`;
    img.alt=song.title;
    const t=document.createElement('div');t.className='sc-title';t.textContent=song.title;
    const m=document.createElement('div');m.className='sc-meta';m.textContent=`${song.bpm} BPM`;
    card.append(img,t,m);
    card.addEventListener('click',()=>selectSong(i));
    list.appendChild(card);
  });
}
function selectSong(idx){
  selectedIdx=idx;selectedSong=SONGS[idx];
  document.querySelectorAll('.sc').forEach((c,i)=>c.classList.toggle('active',i===idx));
  document.getElementById('pv-img-el').src=`https://img.youtube.com/vi/${selectedSong.ytId}/mqdefault.jpg`;
  document.getElementById('pv-title').textContent=selectedSong.title;
  document.getElementById('pv-bpm').textContent=`${selectedSong.bpm} BPM`;
  document.getElementById('song-preview').style.display='flex';
  document.getElementById('yt-thumb-img').src=`https://img.youtube.com/vi/${selectedSong.ytId}/mqdefault.jpg`;
  document.getElementById('yt-thumb').style.display='block';
  document.getElementById('yt-bg').innerHTML='';ytActive=false;
  ctx.clearRect(0,0,W,H);
  hideResult();
  document.getElementById('start-btn').disabled=false;
  document.getElementById('start-btn').style.opacity='1';
  setMsg(`"${selectedSong.title}" 선택됨. 난이도 고르고 시작!`);
}
buildSongList();

function selectDiff(d){
  difficulty=d;const info=DIFF[d];
  document.querySelectorAll('.diff-btn').forEach(b=>{
    const on=b.dataset.d===d;
    b.style.border=on?`2px solid ${info.color}`:'1px solid #222';
    b.style.background=on?`rgba(${hexRgb(info.color)},.2)`:'rgba(255,255,255,.04)';
    b.style.color=on?info.color:'#555';
  });
  document.getElementById('diff-desc').textContent=info.desc;
  document.getElementById('diff-desc').style.color=info.color;
}
document.querySelectorAll('.diff-btn').forEach(b=>b.addEventListener('click',()=>selectDiff(b.dataset.d)));
selectDiff('normal');
</script>
